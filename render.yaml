# Render Blueprint — deploy inference endpoint (FastAPI) via Docker.
# Pakai: dashboard Render -> New -> Blueprint -> pilih repo ini (auto-baca file ini).
services:
  - type: web
    name: human-safety-monitoring
    runtime: docker
    plan: free                  # 512 MB RAM; lihat catatan OOM di DEPLOY.md
    region: singapore           # terdekat ke Indonesia (latency juri)
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health    # Render anggap sehat saat /health -> 200
    autoDeploy: true            # re-deploy otomatis tiap push ke branch default
